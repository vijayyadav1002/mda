<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - Media Asset Manager</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: linear-gradient(135deg, #eff6ff, #e0e7ff);
        color: #0f172a;
      }
      .card {
        max-width: 420px;
        width: calc(100% - 32px);
        border-radius: 16px;
        background: white;
        border: 1px solid #dbeafe;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }
      h1 { margin: 0 0 8px; font-size: 1.2rem; }
      p { margin: 0; color: #334155; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>You are offline</h1>
      <p>The app is not connected right now. Reconnect to continue browsing your media library.</p>
    </main>
  </body>
</html>
